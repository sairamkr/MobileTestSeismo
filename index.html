<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speculative Seismograph — Speculations by Sem06 2026 Interaction Design Students</title>
    <link rel="stylesheet" href="./css/style.css">
    <!-- Resolve the bare "three" import to the locally vendored copy (no CDN). -->
    <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js"
      }
    }
    </script>
</head>
<body>

    <!-- Fixed 16:9 stage; the window letterboxes around it. Everything lives
         inside so it scales together and stays aligned. -->
    <div id="stage">
        <div id="bg-frame"></div>
        <div id="canvas-container"></div>

        <!-- Toggle bank is built by js/toggles.js; pen by js/pen.js -->
        <div id="toggle-panel"></div>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
